<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Code 입문 — lecture-kit</title>
    <link rel="stylesheet" href="/shared/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
  </head>
  <body class="min-h-screen grid-bg-page">
    <!-- Panel frame -->
    <div class="page-frame"></div>
    <div class="page-screw-bl"></div>
    <div class="page-screw-br"></div>

    <div class="max-w-4xl mx-auto px-6 py-16" style="position: relative; z-index: 1;">
      <!-- Breadcrumb -->
      <nav class="flex items-center gap-2 mb-8 text-sm" style="color: var(--color-text-dim);">
        <a href="../../" style="color: var(--color-text-dim); text-decoration: none;" class="hover:text-[var(--color-text-muted)] transition-colors">lecture-kit</a>
        <span>/</span>
        <span style="color: var(--color-text-muted);">Claude Code 입문</span>
      </nav>

      <!-- Header -->
      <header class="mb-12">
        <div class="flex items-center gap-3 mb-6">
          <span class="sig-led sig-led-blue sig-led-pulse"></span>
          <span class="sig-cable sig-cable-blue"></span>
          <span class="sig-led sig-led-green sig-led-pulse" style="animation-delay: 0.4s;"></span>
          <span class="sig-cable sig-cable-green"></span>
          <span class="sig-led sig-led-orange sig-led-pulse" style="animation-delay: 0.8s;"></span>
        </div>

        <div class="sig-label mb-2">Workshop — 2026</div>
        <h1 class="text-4xl font-bold tracking-tight mb-3">
          Claude Code 입문
        </h1>
        <p style="color: var(--color-text-muted)" class="text-base">
          Introduction to Claude Code
        </p>

        <div class="accent-line mt-8" style="background: linear-gradient(90deg, var(--color-accent-blue), var(--color-accent-green), var(--color-accent-orange), transparent);"></div>
      </header>

      <!-- Chapter List -->
      <section>
        <div class="flex items-center gap-3 mb-6">
          <span class="sig-knob"></span>
          <h2 class="text-lg font-semibold">챕터 목록</h2>
          <div class="sig-cable sig-cable-green" style="max-width: 40px;"></div>
        </div>

        <div class="grid gap-3" id="week-list">
          <a href="./level-2-basics.html" class="course-panel group">
            <div class="flex items-center gap-3 mb-2">
              <span class="flex-shrink-0 font-mono text-sm font-bold" style="color: var(--color-text-dim); width: 2rem;">L2</span>
              <span class="sig-led sig-led-green" style="width: 5px; height: 5px;"></span>
              <h3 class="font-semibold group-hover:text-[var(--color-accent-blue)] transition-colors">
                레벨 2 — 기초
              </h3>
            </div>
            <p class="text-sm ml-[3.3rem]" style="color: var(--color-text-muted);">
              CLAUDE.md 설정, 권한 모드, Git 연동, 슬래시 커맨드, 컨텍스트 관리, 메모리 시스템, 멀티파일 작업
            </p>
            <div class="flex items-center gap-2 mt-4 ml-[3.3rem] flex-wrap">
              <span class="badge" style="background: color-mix(in srgb, var(--color-accent-blue) 15%, transparent); color: var(--color-accent-blue);">CLAUDE.md</span>
              <span class="badge" style="background: color-mix(in srgb, var(--color-accent-green) 15%, transparent); color: var(--color-accent-green);">Git</span>
              <span class="badge" style="background: color-mix(in srgb, var(--color-accent-orange) 15%, transparent); color: var(--color-accent-orange);">Commands</span>
              <span class="badge" style="background: color-mix(in srgb, var(--color-accent-purple) 15%, transparent); color: var(--color-accent-purple);">Memory</span>
            </div>
          </a>
        </div>
      </section>

      <!-- Footer -->
      <footer class="mt-20 flex items-center gap-3" style="color: var(--color-text-dim);">
        <a href="../../" style="color: var(--color-text-dim); text-decoration: none; font-size: 0.75rem;" class="hover:text-[var(--color-text-muted)] transition-colors flex items-center gap-2">
          <span class="sig-led sig-led-blue" style="width: 4px; height: 4px; box-shadow: none;"></span>
          <span class="sig-label">&larr; lecture-kit</span>
        </a>
      </footer>
    </div>

    <script type="module">
      import { init } from "/shared/components.js";
      init();
    </script>
  </body>
</html>
