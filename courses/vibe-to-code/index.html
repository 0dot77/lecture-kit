<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe to Code</title>
    <link rel="stylesheet" href="/shared/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
  </head>
  <body class="min-h-screen grid-bg-page">
    <!-- Panel frame -->
    <div class="page-frame"></div>
    <div class="page-screw-bl"></div>
    <div class="page-screw-br"></div>

    <div class="max-w-4xl mx-auto px-6 py-16" style="position: relative; z-index: 1;">
      <!-- Breadcrumb -->
      <nav class="flex items-center gap-2 mb-8 text-sm" style="color: var(--color-text-dim);">
        <span style="color: var(--color-text-muted);">Vibe to Code</span>
      </nav>

      <!-- Header -->
      <header class="mb-12">
        <div class="flex items-center gap-3 mb-6">
          <span class="sig-led sig-led-green sig-led-pulse"></span>
          <span class="sig-cable sig-cable-green"></span>
          <span class="sig-led sig-led-purple sig-led-pulse" style="animation-delay: 0.4s;"></span>
          <span class="sig-cable sig-cable-purple"></span>
          <span class="sig-led sig-led-blue sig-led-pulse" style="animation-delay: 0.8s;"></span>
        </div>

        <div class="sig-label mb-2">Workshop — 2026</div>
        <h1 class="text-4xl font-bold tracking-tight mb-3">
          Vibe to Code
        </h1>
        <p style="color: var(--color-text-muted)" class="text-base">
          바이브 코딩에서 실전 코딩으로
        </p>

        <div class="accent-line mt-8" style="background: linear-gradient(90deg, var(--color-accent-green), var(--color-accent-purple), var(--color-accent-blue), transparent);"></div>
      </header>

      <!-- Chapter List -->
      <section>
        <div class="flex items-center gap-3 mb-6">
          <span class="sig-knob"></span>
          <h2 class="text-lg font-semibold">챕터 목록</h2>
          <div class="sig-cable sig-cable-purple" style="max-width: 40px;"></div>
        </div>

        <div class="grid gap-3" id="week-list">
          <a href="week-01.html" class="course-panel">
            <div class="flex items-center gap-2 mb-2">
              <span class="sig-led sig-led-green sig-led-pulse"></span>
              <span class="sig-label">Week 01</span>
            </div>
            <h3 class="text-base font-semibold mb-1">AI와 대화하기</h3>
            <p style="color: var(--color-text-muted);" class="text-sm">
              Claude를 만나고, 채팅과 에이전트의 차이를 체험한다
            </p>
          </a>

          <a href="week-02.html" class="course-panel">
            <div class="flex items-center gap-2 mb-2">
              <span class="sig-led sig-led-green sig-led-pulse"></span>
              <span class="sig-label">Week 02</span>
            </div>
            <h3 class="text-base font-semibold mb-1">나의 언어를 Claude에게 가르치기</h3>
            <p style="color: var(--color-text-muted);" class="text-sm">
              내 프로젝트를 세팅하고 CLAUDE.md를 작성한다
            </p>
          </a>

          <div class="course-panel" style="opacity: 0.5; pointer-events: none;">
            <div class="flex items-center gap-2 mb-2">
              <span class="sig-led sig-led-blue"></span>
              <span class="sig-label">Week 03</span>
            </div>
            <h3 class="text-base font-semibold mb-1">만들기: 바이브를 코드로</h3>
            <p style="color: var(--color-text-muted);" class="text-sm">
              MCP와 외부 도구를 연결하여 만든다
            </p>
          </div>

          <div class="course-panel" style="opacity: 0.5; pointer-events: none;">
            <div class="flex items-center gap-2 mb-2">
              <span class="sig-led sig-led-orange"></span>
              <span class="sig-label">Week 04</span>
            </div>
            <h3 class="text-base font-semibold mb-1">시스템으로, 그리고 밖으로</h3>
            <p style="color: var(--color-text-muted);" class="text-sm">
              시스템으로 확장하고 세상에 내보낸다
            </p>
          </div>
        </div>
      </section>

    </div>

    <script type="module">
      import { init } from "/shared/components.js";
      init();
    </script>
  </body>
</html>
