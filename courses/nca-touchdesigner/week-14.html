<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>14주차 · 개별 프로젝트 기획 및 제작 — NCA TouchDesigner</title>
    <link rel="stylesheet" href="/shared/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
  </head>
  <body class="min-h-screen grid-bg-page">
    <div class="page-frame"></div>
    <div class="page-screw-bl"></div>
    <div class="page-screw-br"></div>

    <div class="max-w-4xl mx-auto px-6 py-16" style="position: relative; z-index: 1;">
      <!-- Breadcrumb -->
      <nav class="flex items-center gap-2 mb-8 text-sm" style="color: var(--color-text-dim);">
        <a href="./" style="color: var(--color-text-muted);" class="hover:text-white transition-colors">NCA TouchDesigner</a>
        <span style="color: var(--color-text-dim);">/</span>
        <span style="color: var(--color-text-muted);">Week 14</span>
      </nav>

      <!-- Header -->
      <header class="mb-12">
        <div class="flex items-center gap-3 mb-6">
          <span class="sig-led sig-led-blue sig-led-pulse"></span>
          <span class="sig-cable sig-cable-blue"></span>
          <span class="sig-label">Week 14 · 2026-08-11</span>
        </div>

        <h1 class="text-4xl font-bold tracking-tight mb-3">
          개별 프로젝트 기획 및 제작
        </h1>
        <p style="color: var(--color-text-muted)" class="text-base">
          개별 프로젝트 구조 설계, 입력-처리-출력 흐름 점검, 제작 진행
        </p>

        <div class="accent-line mt-8" style="background: linear-gradient(90deg, var(--color-accent-blue), var(--color-accent-purple), transparent);"></div>
      </header>

      <!-- Placeholder -->
      <section class="course-panel" style="text-align: center; padding: 4rem 2rem;">
        <div class="flex items-center justify-center gap-3 mb-4">
          <span class="sig-led sig-led-blue"></span>
          <span class="sig-label">Status</span>
        </div>
        <h2 class="text-xl font-semibold mb-2">준비 중</h2>
        <p style="color: var(--color-text-muted);" class="text-sm">
          14주차 강의 자료가 곧 올라옵니다
        </p>
      </section>
    </div>

    <script type="module">
      import { init } from "/shared/components.js";
      init();
    </script>
  </body>
</html>
